name: multi-example – e2e tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: read

jobs:
  run-playwright-tests:
    name: Playwright Tests
    runs-on: ubuntu-latest
    container: node:20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: PNPM Install
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org/

      - name: Enable Corepack and Setup PNPM
        run: |
          corepack enable
          corepack prepare pnpm@10.28.2 --activate

      - name: Restore Playwright Browser Cache
        uses: actions/cache@v4
        with:
          path: /root/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-chromium-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium Browser
        run: pnpm playwright install --with-deps chromium

      - name: Build Libs
        run: pnpm build && pnpm build:shared-lib

      - name: Run Playwright Tests
        run: pnpm playwright test

      - name: Upload Artifacts on Failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: reports/e2e/output
          retention-days: 3
