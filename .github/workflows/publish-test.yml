name: Publish Test
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build & Pack on Node ${{ matrix.node }}

    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['22.x', '24.x', '25.x']

    steps:
      - name: Checkout repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.28.2

      - name: Use node ${{ matrix.node }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org/

      - run: corepack enable

      - name: Install deps
        run: pnpm install

      # Read existing version, reuse that, add a Git short hash
      - name: Set build version to Git commit
        run: node scripts/writeGitVersion.js $(git rev-parse --short HEAD)

      - name: Check updated version
        run: jq .version package.json

      - name: Build
        run: pnpm build

      - name: Pack
        run: pnpm pack --out package-node-${{ matrix.node }}.tgz

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: package-node-${{ matrix.node }}
          path: package-node-${{ matrix.node }}.tgz

  test-published-artifact:
    name: Test Published Artifact ${{ matrix.example }} (Node ${{ matrix.node }})
    defaults:
      run:
        working-directory: ./.github/publish-ci/${{ matrix.example }}

    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22.x', '24.x', '25.x']
        example: ['node-standard', 'node-esm']
    steps:
      - name: Checkout repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.28.2

      - name: Use node ${{ matrix.node }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org/

      - run: corepack enable

      - name: Install deps
        run: pnpm install

      - name: Remove existing build artifact
        run: pnpm remove @module-federation/vite

      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: package-node-${{ matrix.node }}
          path: ./.github/publish-ci/${{ matrix.example }}

      - name: Install build artifact
        run: pnpm add ./package-node-${{ matrix.node }}.tgz

      - name: Build example
        run: pnpm build

      - name: Run test step
        run: pnpm test
